# === Generic test escalations for view-only tests ===
# These are for tests that don't create sessions (login, pending-approvals, session-browser, debug-session)
# They can use any user since they just check UI elements
---
apiVersion: breakglass.t-caas.telekom.com/v1alpha1
kind: BreakglassEscalation
metadata:
  name: ui-e2e-generic-test-1
  labels:
    breakglass.dev/test-resource: "true"
    breakglass.dev/ui-e2e: "true"
spec:
  allowed:
    clusters:
      - breakglass-hub
    groups:
      - developers  # bob@example.com has this
  escalatedGroup: ui-e2e-generic-group-1
  approvers:
    groups:
      - senior-ops
  maxValidFor: 2h
  retainFor: 24h
---
apiVersion: breakglass.t-caas.telekom.com/v1alpha1
kind: BreakglassEscalation
metadata:
  name: ui-e2e-generic-test-2
  labels:
    breakglass.dev/test-resource: "true"
    breakglass.dev/ui-e2e: "true"
spec:
  allowed:
    clusters:
      - breakglass-hub
    groups:
      - dev  # Many users have this
  escalatedGroup: ui-e2e-generic-group-2
  approvers:
    groups:
      - approvers
  maxValidFor: 2h
  retainFor: 24h
