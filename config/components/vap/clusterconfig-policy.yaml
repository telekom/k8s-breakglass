# ValidatingAdmissionPolicy: ClusterConfig validations
#
# Supplements webhook-based validation with in-process CEL checks.
# Phase 1 — deployed in Warn mode alongside existing webhooks.
#
# Requires Kubernetes 1.30+ (ValidatingAdmissionPolicy GA).

apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: breakglass-clusterconfig-validation
  labels:
    app.kubernetes.io/name: breakglass
    app.kubernetes.io/component: admission
    breakglass.t-caas.telekom.com/phase: "1"
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups: ["breakglass.t-caas.telekom.com"]
        apiVersions: ["v1alpha1"]
        operations: ["CREATE", "UPDATE"]
        resources: ["clusterconfigs"]

  validations:
    # Auth config mutual exclusivity: kubeconfigSecretRef vs oidcAuth/oidcFromIdentityProvider
    - expression: >-
        !has(object.spec.kubeconfigSecretRef) || (!has(object.spec.oidcAuth) && !has(object.spec.oidcFromIdentityProvider))
      message: "kubeconfigSecretRef is mutually exclusive with oidcAuth and oidcFromIdentityProvider"
      reason: Invalid

    # Auth config mutual exclusivity: oidcAuth vs oidcFromIdentityProvider
    - expression: >-
        (!has(object.spec.oidcAuth) || !has(object.spec.oidcAuth.issuerURL) || object.spec.oidcAuth.issuerURL == '') || (!has(object.spec.oidcFromIdentityProvider) || !has(object.spec.oidcFromIdentityProvider.name) || object.spec.oidcFromIdentityProvider.name == '')
      message: "oidcAuth.issuerURL is mutually exclusive with oidcFromIdentityProvider"
      reason: Invalid

    # kubeconfigSecretRef.name must be non-empty when set
    - expression: >-
        !has(object.spec.kubeconfigSecretRef) ||
        object.spec.kubeconfigSecretRef.name.size() > 0
      message: "spec.kubeconfigSecretRef.name is required when kubeconfigSecretRef is set"
      reason: Invalid

    # No duplicate identityProviderRefs
    - expression: >-
        !has(object.spec.identityProviderRefs) ||
        object.spec.identityProviderRefs.size() == object.spec.identityProviderRefs.toSet().size()
      message: "spec.identityProviderRefs must not contain duplicates"
      reason: Invalid
