{{- /*
This ConfigMap provides OpenTelemetry configuration.
It is intentionally not auto-mounted. Operators must mount it into the controller Deployment manually.
*/ -}}
{{- if .Values.cluster.telemetry }}
{{- if .Values.cluster.telemetry.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "escalation-config.fullname" . }}-telemetry
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "escalation-config.labels" . | nindent 4 }}
data:
  telemetry.yaml: |
    telemetry:
      enabled: {{ .Values.cluster.telemetry.enabled }}
      exporter: {{ .Values.cluster.telemetry.exporter | default "otlp" | quote }}
      endpoint: {{ .Values.cluster.telemetry.endpoint | quote }}
      insecure: {{ .Values.cluster.telemetry.insecure | default false }}
      samplingRate: {{ .Values.cluster.telemetry.samplingRate | default 1.0 }}
{{- end }}
{{- end }}
