name: UI E2E Tests

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'pkg/api/**'
      - 'pkg/mail/**'
  pull_request:
    paths:
      - 'frontend/**'
  workflow_dispatch:

jobs:
  ui-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright Browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Install Kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.20.0/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      - name: Build breakglass image
        run: make docker-build-dev

      - name: Setup E2E environment
        run: ./e2e/kind-setup-single.sh

      - name: Wait for services
        run: |
          echo "Waiting for frontend..."
          timeout 120 bash -c 'until curl -s http://localhost:5173 > /dev/null 2>&1; do sleep 2; done' || true

          echo "Waiting for MailHog..."
          timeout 60 bash -c 'until curl -s http://localhost:8025 > /dev/null 2>&1; do sleep 2; done' || true

          echo "Waiting for Keycloak..."
          timeout 120 bash -c 'until curl -sk https://localhost:8443/realms/master > /dev/null 2>&1; do sleep 2; done' || true

          echo "Services ready!"

      - name: Run UI E2E Tests
        working-directory: frontend
        env:
          BREAKGLASS_UI_URL: http://localhost:5173
          MAILHOG_URL: http://localhost:8025
          KEYCLOAK_URL: https://localhost:8443
        run: npx playwright test --config=playwright.e2e.config.ts

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-e2e-report
          path: frontend/playwright-report-e2e/
          retention-days: 7

      - name: Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: playwright-e2e-results
          path: frontend/test-results/
          retention-days: 7

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          echo "=== MailHog Messages ==="
          curl -s http://localhost:8025/api/v2/messages 2>/dev/null | jq '.items[] | {subject: .Content.Headers.Subject[0], from: .From, to: .To}' || echo "Could not fetch MailHog messages"

          echo ""
          echo "=== Breakglass Controller Logs ==="
          kubectl logs -l app=breakglass -n breakglass-dev-system --tail=100 2>/dev/null || echo "Could not fetch controller logs"

          echo ""
          echo "=== Keycloak Logs ==="
          kubectl logs -l app=keycloak -n breakglass-dev-system --tail=50 2>/dev/null || echo "Could not fetch Keycloak logs"

      - name: Teardown
        if: always()
        run: |
          kind delete cluster --name breakglass-dev 2>/dev/null || true
