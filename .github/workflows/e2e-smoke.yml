name: E2E Smoke

on:
  pull_request:
    branches: [ main, deployment-testing ]
    paths:
      - 'e2e/**'
      - 'pkg/**'
      - 'cmd/**'
      - 'api/**'
      - 'charts/**'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  KIND_VERSION: 'v0.31.0'
  KIND_NODE_IMAGE: 'kindest/node:v1.34.3@sha256:08497ee19eace7b4b5348db5c6a1591d7752b164530a36f855cb0f2bdcbadd48'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: E2E Bootstrap Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Kind
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Build controller image
        run: docker build -t breakglass:e2e .

      - name: Set up Kind cluster and deploy
        run: bash e2e/kind-setup-single.sh
        env:
          KIND_NODE_IMAGE: ${{ env.KIND_NODE_IMAGE }}
          IMAGE: breakglass:e2e

      - name: Run E2E bootstrap smoke tests (C-001, C-002, K-001, K-002, W-001, W-002, T-001, T-002)
        run: >
          E2E_TEST=true
          go test -v -tags=e2e -timeout=20m
          -run 'TestBootstrap'
          ./e2e/...
        env:
          KUBECONFIG: ${{ github.workspace }}/e2e/kind-setup-single-hub-kubeconfig.yaml
          IMAGE: breakglass:e2e

      - name: Dump controller logs on failure
        if: failure()
        run: |
          kubectl logs -n breakglass-system -l app=breakglass --tail=200 || true
          kubectl logs -n breakglass-system -l app=keycloak --tail=100 || true
        env:
          KUBECONFIG: ${{ github.workspace }}/e2e/kind-setup-single-hub-kubeconfig.yaml

      - name: Tear down Kind cluster
        if: always()
        run: kind delete cluster --name breakglass-hub || true
