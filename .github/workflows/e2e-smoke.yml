name: E2E Smoke

on:
  pull_request:
    branches: [ main, deployment-testing ]
    paths:
      - 'e2e/**'
      - 'pkg/**'
      - 'cmd/**'
      - 'api/**'
      - 'charts/**'
  workflow_dispatch: {}

permissions:
  contents: read

env:
  KIND_VERSION: 'v0.32.0'
  KIND_NODE_IMAGE: 'kindest/node:v1.36.1@sha256:3489c7674813ba5d8b1a9977baea8a6e553784dab7b84759d1014dbd78f7ebd5'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e-smoke:
    name: E2E Bootstrap Smoke
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Kind
        run: |
          curl -Lo ./kind "https://kind.sigs.k8s.io/dl/${{ env.KIND_VERSION }}/kind-linux-amd64"
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind
          kind version

      - name: Build controller image
        run: docker build -t breakglass:e2e .

      - name: Set up Kind cluster and deploy
        run: bash e2e/kind-setup-single.sh
        env:
          KIND_NODE_IMAGE: ${{ env.KIND_NODE_IMAGE }}
          IMAGE: breakglass:e2e
          SKIP_PROXY: "true"
          SKIP_BUILD: "true"

      - name: Export e2e environment
        run: |
          ENV_FILE="${{ github.workspace }}/e2e/kind-setup-single-tdir/e2e-env.sh"
          if [ -f "$ENV_FILE" ]; then
            # Source and export all vars to GITHUB_ENV
            set -a
            source "$ENV_FILE"
            set +a
            env | grep -E '^(KEYCLOAK_|BREAKGLASS_|WEBHOOK_|TDIR|TENANT_|API_PORT|METRICS_PORT)' >> "$GITHUB_ENV" || true
          fi

      - name: Run E2E bootstrap smoke tests (C-001, C-002, K-001, K-002, W-001, W-002, T-001, T-002)
        run: >
          E2E_TEST=true
          go test -v -tags=e2e_bootstrap -timeout=20m
          -run 'TestBootstrap'
          ./e2e/...
        env:
          KUBECONFIG: ${{ github.workspace }}/e2e/kind-setup-single-hub-kubeconfig.yaml
          IMAGE: breakglass:e2e

      - name: Dump controller logs on failure
        if: failure()
        run: |
          kubectl logs -n breakglass-system -l app=breakglass --tail=200 || true
          kubectl logs -n breakglass-system -l app=keycloak --tail=100 || true
        env:
          KUBECONFIG: ${{ github.workspace }}/e2e/kind-setup-single-hub-kubeconfig.yaml

      - name: Tear down Kind cluster
        if: always()
        run: kind delete cluster --name breakglass-hub || true
